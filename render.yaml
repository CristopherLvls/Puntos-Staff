services:
  - type: web
    name: insight-ia-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_GUILD_ID
        sync: false
      - key: DISCORD_SYNC_COMMANDS
        value: "false"
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_API_KEY_2
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: MONGODB_READONLY_URI
        sync: false
      - key: MONGODB_READONLY_DB
        value: sirgiobot
      - key: MONGODB_WRITE_URI
        sync: false
      - key: MONGODB_WRITE_DB
        value: insight_ia
      - key: MONGODB_LOGS_COLLECTIONS
        value: auditlogs,modcases,ticketreviews,suggestions
      - key: ADMIN_ROLE_IDS
        sync: false
      - key: ROLE_HELPER_ID
        value: "1522373412880646288"
      - key: ROLE_MODERATOR_ID
        value: "1510511672563994674"
      - key: ROLE_TESTER_ID
        value: "1522373488990752869"
      - key: STAFF_CHAT_ENABLED
        value: "true"
      - key: STAFF_CHAT_CATEGORY_ID
        value: "1222957745859465358"
      - key: STAFF_CHAT_DEBOUNCE_SECONDS
        value: "4"
      - key: STAFF_CHAT_MAX_PER_MINUTE
        value: "12"
      - key: STAFF_CHAT_SYNC_KNOWLEDGE
        value: "true"
